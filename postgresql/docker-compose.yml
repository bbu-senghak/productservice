version: "3.9"

services:
  postgres-bbu-master-local:
    image: postgres:17
    container_name: postgres-bbu-master-local
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: BBU@2026
      POSTGRES_DB: dev_product_db
    ports:
      - "2677:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: